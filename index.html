<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palmeraie Dimako</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,900;1,600&family=Outfit:wght@300;400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --green:      #0D3B2E;
  --green-mid:  #1A6B4A;
  --green-light:#2E9E6E;
  --gold:       #C8860A;
  --gold-light: #F0C85A;
  --cream:      #F7F4EE;
  --cream-dark: #EDE8DC;
  --text:       #1A2018;
  --muted:      #6B7A65;
  --border:     #D5CCBA;
  --white:      #FFFFFF;
  --red:        #B83232;
  --radius:     14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
}

/* ===== SCREEN SYSTEM ===== */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; }

/* ===== ACCUEIL ===== */
#screen-accueil {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--green);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(42,158,110,0.18) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(200,134,10,0.12) 0%, transparent 50%);
  padding: 40px 20px;
  position: relative;
  overflow: hidden;
}

.accueil-deco {
  position: absolute;
  font-size: 14rem;
  opacity: 0.04;
  pointer-events: none;
  user-select: none;
}
.deco-1 { top: -40px; right: -20px; transform: rotate(20deg); }
.deco-2 { bottom: -60px; left: -30px; transform: rotate(-15deg); }

.accueil-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 48px 44px;
  width: 100%;
  max-width: 480px;
  backdrop-filter: blur(10px);
  position: relative;
  z-index: 1;
}

.accueil-logo {
  text-align: center;
  font-size: 3.5rem;
  margin-bottom: 8px;
  filter: drop-shadow(0 4px 16px rgba(200,134,10,0.4));
}

.accueil-title {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  color: var(--gold-light);
  text-align: center;
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.accueil-sub {
  text-align: center;
  color: rgba(255,255,255,0.45);
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 36px;
  margin-top: 6px;
}

.form-label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 13px 16px;
  font-size: 1rem;
  font-family: 'Outfit', sans-serif;
  color: #fff;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}

.form-input::placeholder { color: rgba(255,255,255,0.25); }
.form-input:focus {
  border-color: var(--gold-light);
  background: rgba(255,255,255,0.1);
}

.form-group { margin-bottom: 20px; }

/* Zone selector */
.zone-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 28px;
}

.zone-btn {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 16px 10px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  color: rgba(255,255,255,0.6);
  font-family: 'Outfit', sans-serif;
}

.zone-btn:hover {
  border-color: rgba(240,200,90,0.5);
  background: rgba(240,200,90,0.08);
  color: var(--gold-light);
}

.zone-btn.selected {
  border-color: var(--gold-light);
  background: rgba(240,200,90,0.15);
  color: var(--gold-light);
}

.zone-icon { font-size: 1.6rem; display: block; margin-bottom: 6px; }
.zone-name { font-size: 0.78rem; font-weight: 600; line-height: 1.2; }

.btn-enter {
  width: 100%;
  background: linear-gradient(135deg, var(--gold) 0%, #E8A020 100%);
  color: var(--green);
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-size: 1rem;
  font-weight: 700;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(200,134,10,0.35);
  letter-spacing: 0.02em;
}

.btn-enter:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(200,134,10,0.45);
}

.error-msg {
  background: rgba(184,50,50,0.15);
  border: 1px solid rgba(184,50,50,0.4);
  color: #FF8080;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 0.85rem;
  margin-bottom: 16px;
  display: none;
}

/* ===== APP SCREEN ===== */
#screen-app {
  flex-direction: column;
  background: var(--cream);
}

/* Header */
.app-header {
  background: var(--green);
  padding: 0 28px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left { display: flex; align-items: center; gap: 14px; }
.header-logo { font-size: 1.5rem; }
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: var(--gold-light);
  font-weight: 700;
}
.header-zone {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-user {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-chip {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 5px 14px 5px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.user-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--gold);
  color: var(--green);
  font-weight: 700;
  font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.user-name-chip {
  color: rgba(255,255,255,0.8);
  font-size: 0.82rem;
  font-weight: 500;
}

.btn-deconnect {
  background: none;
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.45);
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 0.78rem;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  transition: all 0.2s;
}
.btn-deconnect:hover { border-color: var(--red); color: #FF8080; }

/* Main form area */
.app-body {
  flex: 1;
  padding: 28px 32px 40px;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}

/* Section title */
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  color: var(--green);
  font-weight: 900;
  margin-bottom: 6px;
}
.section-desc {
  color: var(--muted);
  font-size: 0.88rem;
  margin-bottom: 28px;
}

/* Mois selector */
.mois-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}

.mois-chip {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--white);
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.18s;
  font-family: 'Outfit', sans-serif;
}

.mois-chip:hover { border-color: var(--green-light); color: var(--green); }
.mois-chip.selected {
  background: var(--green);
  border-color: var(--green);
  color: var(--gold-light);
}

/* Form card */
.form-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: 0 2px 16px rgba(13,59,46,0.06);
  padding: 28px;
  margin-bottom: 20px;
}

.form-card-title {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--cream-dark);
  display: flex;
  align-items: center;
  gap: 8px;
}

.form-card-title span { font-size: 1rem; }

.fields-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.field-group { display: flex; flex-direction: column; gap: 6px; }
.field-label {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--muted);
}
.field-req { color: var(--red); }

.field-input {
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 10px 13px;
  font-size: 0.92rem;
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  background: var(--cream);
  outline: none;
  transition: border-color 0.18s, box-shadow 0.18s;
  width: 100%;
}

.field-input:focus {
  border-color: var(--green-light);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(46,158,110,0.1);
}

.field-input.full { grid-column: 1 / -1; }
.field-input[type="number"] { font-family: 'DM Mono', monospace; }

/* Action bar */
.action-bar {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-top: 8px;
}

.btn-save {
  background: var(--green-mid);
  color: var(--white);
  border: none;
  border-radius: 10px;
  padding: 12px 28px;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 10px rgba(26,107,74,0.25);
}
.btn-save:hover { background: var(--green); transform: translateY(-1px); }

.btn-pdf {
  background: var(--gold);
  color: var(--white);
  border: none;
  border-radius: 10px;
  padding: 12px 24px;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 10px rgba(200,134,10,0.25);
  display: flex;
  align-items: center;
  gap: 7px;
}
.btn-pdf:hover { background: #A06E08; transform: translateY(-1px); }

.btn-reset {
  background: none;
  border: 1.5px solid var(--border);
  color: var(--muted);
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-reset:hover { border-color: var(--red); color: var(--red); }

/* Saved badge */
.saved-badge {
  background: #E8F5EE;
  color: var(--green-mid);
  border: 1px solid #B7DDC8;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 0.82rem;
  font-weight: 600;
  display: none;
}

/* Récapitulatif */
.recap-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.recap-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}

.recap-val {
  font-family: 'DM Mono', monospace;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--green);
}

.recap-label {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 4px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 28px; right: 28px;
  background: var(--green);
  color: var(--gold-light);
  padding: 12px 22px;
  border-radius: 10px;
  font-size: 0.875rem;
  font-weight: 600;
  box-shadow: 0 8px 28px rgba(0,0,0,0.2);
  z-index: 999;
  display: none;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }

@media (max-width:600px) {
  .fields-grid { grid-template-columns: 1fr; }
  .zone-grid { grid-template-columns: 1fr 1fr; }
  .recap-grid { grid-template-columns: 1fr 1fr; }
  .app-body { padding: 16px; }
  .accueil-card { padding: 32px 24px; }
  .action-bar { flex-wrap: wrap; }
}

@media print {
  .app-header, .action-bar, .mois-bar { display: none !important; }
}
</style>
</head>
<body>

<!-- ===== ÉCRAN ACCUEIL ===== -->
<div id="screen-accueil" class="screen active">
  <div class="accueil-deco deco-1">🌴</div>
  <div class="accueil-deco deco-2">🌿</div>

  <div class="accueil-card">
    <div class="accueil-logo">🌴</div>
    <h1 class="accueil-title">Palmeraie Dimako</h1>
    <p class="accueil-sub">Gestion intégrée 2026</p>

    <div class="form-group">
      <label class="form-label">Votre nom</label>
      <input type="text" id="inputNom" class="form-input" placeholder="Entrez votre nom..." autocomplete="off"
        onkeydown="if(event.key==='Enter')entrer()">
    </div>

    <div class="form-group">
      <label class="form-label">Votre zone de travail</label>
      <div class="zone-grid">
        <button class="zone-btn" onclick="selectZone('production')" id="zone-production">
          <span class="zone-icon">🌴</span>
          <span class="zone-name">Zone de production</span>
        </button>
        <button class="zone-btn" onclick="selectZone('dimako')" id="zone-dimako">
          <span class="zone-icon">🛒</span>
          <span class="zone-name">Boutique Dimako</span>
        </button>
        <button class="zone-btn" onclick="selectZone('bertoua')" id="zone-bertoua">
          <span class="zone-icon">🏪</span>
          <span class="zone-name">Boutique Bertoua</span>
        </button>
      </div>
    </div>

    <div class="error-msg" id="accueilError">Veuillez entrer votre nom et choisir une zone.</div>

    <button class="btn-enter" onclick="entrer()">Accéder au formulaire →</button>
  </div>
</div>

<!-- ===== ÉCRAN APPLICATION ===== -->
<div id="screen-app" class="screen">

  <header class="app-header">
    <div class="header-left">
      <div class="header-logo">🌴</div>
      <div>
        <div class="header-title">Palmeraie Dimako</div>
        <div class="header-zone" id="headerZone">—</div>
      </div>
    </div>
    <div class="header-user">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatarApp">?</div>
        <div class="user-name-chip" id="userNameApp">—</div>
      </div>
      <button class="btn-deconnect" onclick="deconnecter()">↩ Quitter</button>
    </div>
  </header>

  <div class="app-body">
    <div class="section-title" id="formTitle">Saisie mensuelle</div>
    <p class="section-desc" id="formDesc">Sélectionnez le mois concerné puis remplissez les champs.</p>

    <!-- Sélecteur de mois -->
    <div class="mois-bar" id="moisBar"></div>

    <!-- Récap rapide -->
    <div class="recap-grid" id="recapGrid" style="display:none">
      <div class="recap-card"><div class="recap-val" id="recap1">—</div><div class="recap-label" id="recap1lbl">—</div></div>
      <div class="recap-card"><div class="recap-val" id="recap2">—</div><div class="recap-label" id="recap2lbl">—</div></div>
      <div class="recap-card"><div class="recap-val" id="recap3">—</div><div class="recap-label" id="recap3lbl">—</div></div>
    </div>

    <!-- FORMULAIRE PRODUCTION -->
    <div id="form-production" style="display:none">
      <div class="form-card">
        <div class="form-card-title"><span>🌴</span> Récolte</div>
        <div class="fields-grid">
          <div class="field-group">
            <label class="field-label">Régimes coupés</label>
            <input type="number" class="field-input" id="p-regimes" placeholder="0" min="0" oninput="updateRecap()">
          </div>
          <div class="field-group">
            <label class="field-label">Fûts préparés</label>
            <input type="number" class="field-input" id="p-futs" placeholder="0" min="0">
          </div>
          <div class="field-group">
            <label class="field-label">Huile obtenue (litres)</label>
            <input type="number" class="field-input" id="p-huile" placeholder="0" min="0" oninput="updateRecap()">
          </div>
          <div class="field-group">
            <label class="field-label">Observations</label>
            <input type="text" class="field-input" id="p-obs" placeholder="Remarques...">
          </div>
        </div>
      </div>

      <div class="form-card">
        <div class="form-card-title"><span>💰</span> Dépenses</div>
        <div class="fields-grid">
          <div class="field-group">
            <label class="field-label">Dons divers (FCFA)</label>
            <input type="number" class="field-input" id="p-dons" placeholder="0" min="0" oninput="updateRecap()">
          </div>
          <div class="field-group">
            <label class="field-label">Salaires presseurs (FCFA)</label>
            <input type="number" class="field-input" id="p-salaires" placeholder="0" min="0" oninput="updateRecap()">
          </div>
          <div class="field-group">
            <label class="field-label">Autres dépenses (FCFA)</label>
            <input type="number" class="field-input" id="p-autres" placeholder="0" min="0" oninput="updateRecap()">
          </div>
        </div>
      </div>
    </div>

    <!-- FORMULAIRE BOUTIQUE -->
    <div id="form-boutique" style="display:none">
      <div class="form-card">
        <div class="form-card-title"><span>🫙</span> Stock & Mouvements</div>
        <div class="fields-grid">
          <div class="field-group">
            <label class="field-label">Huile récupérée (litres)</label>
            <input type="number" class="field-input" id="b-recup" placeholder="0" min="0" oninput="updateRecap()">
          </div>
          <div class="field-group">
            <label class="field-label">Huile sortie (bidons)</label>
            <input type="number" class="field-input" id="b-sortie" placeholder="0" min="0">
          </div>
          <div class="field-group">
            <label class="field-label">Huile vendue (bidons)</label>
            <input type="number" class="field-input" id="b-vendu" placeholder="0" min="0">
          </div>
          <div class="field-group">
            <label class="field-label">À recouvrir (bidons)</label>
            <input type="number" class="field-input" id="b-recouvrir" placeholder="0" min="0">
          </div>
          <div class="field-group">
            <label class="field-label">Stock restant (bidons)</label>
            <input type="number" class="field-input" id="b-stocks" placeholder="0" min="0">
          </div>
          <div class="field-group">
            <label class="field-label">Retour mauvaise huile</label>
            <input type="number" class="field-input" id="b-retour" placeholder="0" min="0">
          </div>
        </div>
      </div>

      <div class="form-card">
        <div class="form-card-title"><span>💰</span> Finances</div>
        <div class="fields-grid">
          <div class="field-group">
            <label class="field-label">Recettes (FCFA)</label>
            <input type="number" class="field-input" id="b-recettes" placeholder="0" min="0" oninput="updateRecap()">
          </div>
          <div class="field-group">
            <label class="field-label">Dépenses (FCFA)</label>
            <input type="number" class="field-input" id="b-depenses" placeholder="0" min="0" oninput="updateRecap()">
          </div>
        </div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="action-bar" id="actionBar" style="display:none">
      <button class="btn-save" onclick="sauvegarder()">✓ Enregistrer</button>
      <button class="btn-pdf" onclick="genererPDF()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Générer PDF
      </button>
      <button class="btn-reset" onclick="viderFormulaire()">✗ Effacer</button>
      <div class="saved-badge" id="savedBadge">✓ Enregistré !</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MOIS = ['JANVIER','FÉVRIER','MARS','AVRIL','MAI','JUIN','JUILLET','AOÛT','SEPTEMBRE','OCTOBRE','NOVEMBRE','DÉCEMBRE'];

let currentUser = '';
let currentZone = '';
let currentMois = '';
let allData = JSON.parse(localStorage.getItem('palmeraie_v2') || '{"production":{},"dimako":{},"bertoua":{}}');

// ===== ACCUEIL =====
function selectZone(zone) {
  currentZone = zone;
  document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('zone-' + zone).classList.add('selected');
}

function entrer() {
  const nom = document.getElementById('inputNom').value.trim();
  const err = document.getElementById('accueilError');
  if (!nom || !currentZone) { err.style.display = 'block'; return; }
  err.style.display = 'none';
  currentUser = nom;
  lancerApp();
}

function lancerApp() {
  // Update header
  document.getElementById('userAvatarApp').textContent = currentUser.charAt(0).toUpperCase();
  document.getElementById('userNameApp').textContent = currentUser;

  const zoneLabels = { production: '🌴 Zone de production', dimako: '🛒 Boutique Dimako', bertoua: '🏪 Boutique Bertoua' };
  document.getElementById('headerZone').textContent = zoneLabels[currentZone];

  const titres = { production: 'Zone de production', dimako: 'Boutique Dimako', bertoua: 'Boutique Bertoua' };
  document.getElementById('formTitle').textContent = titres[currentZone];
  document.getElementById('formDesc').textContent = 'Sélectionnez le mois puis remplissez les informations.';

  // Mois bar
  const bar = document.getElementById('moisBar');
  bar.innerHTML = '';
  MOIS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mois-chip';
    btn.textContent = m.substring(0,3);
    btn.title = m;
    btn.onclick = () => selectionnerMois(m);
    bar.appendChild(btn);
  });

  // Show correct form
  document.getElementById('form-production').style.display = currentZone === 'production' ? 'block' : 'none';
  document.getElementById('form-boutique').style.display   = currentZone !== 'production' ? 'block' : 'none';

  // Switch screens
  document.getElementById('screen-accueil').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
}

function deconnecter() {
  currentUser = ''; currentZone = ''; currentMois = '';
  document.getElementById('inputNom').value = '';
  document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-accueil').classList.add('active');
}

// ===== MOIS =====
function selectionnerMois(mois) {
  currentMois = mois;
  document.querySelectorAll('.mois-chip').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.mois-chip').forEach(c => {
    if (c.title === mois) c.classList.add('selected');
  });

  // Load saved data
  const store = allData[currentZone]?.[mois] || {};
  chargerDonnees(store);

  document.getElementById('actionBar').style.display  = 'flex';
  document.getElementById('recapGrid').style.display  = 'grid';
  updateRecap();
}

function chargerDonnees(data) {
  const Z = currentZone === 'production';
  const ids = Z
    ? ['p-regimes','p-futs','p-huile','p-obs','p-dons','p-salaires','p-autres']
    : ['b-recup','b-sortie','b-vendu','b-recouvrir','b-stocks','b-retour','b-recettes','b-depenses'];
  const keys = Z
    ? ['regimes','futs','huile','obs','dons','salaires','autres']
    : ['recup','sortie','vendu','recouvrir','stocks','retour','recettes','depenses'];
  ids.forEach((id, i) => {
    const el = document.getElementById(id);
    if (el) el.value = data[keys[i]] || '';
  });
}

// ===== RECAP =====
function updateRecap() {
  if (!currentMois) return;
  if (currentZone === 'production') {
    const reg  = +document.getElementById('p-regimes').value||0;
    const h    = +document.getElementById('p-huile').value||0;
    const dep  = (+document.getElementById('p-dons').value||0) + (+document.getElementById('p-salaires').value||0) + (+document.getElementById('p-autres').value||0);
    const rend = reg > 0 ? (h/reg).toFixed(1) : '—';
    document.getElementById('recap1').textContent = reg.toLocaleString('fr-FR');
    document.getElementById('recap1lbl').textContent = 'Régimes coupés';
    document.getElementById('recap2').textContent = h.toLocaleString('fr-FR') + ' L';
    document.getElementById('recap2lbl').textContent = 'Huile produite';
    document.getElementById('recap3').textContent = dep.toLocaleString('fr-FR') + ' F';
    document.getElementById('recap3lbl').textContent = 'Total dépenses';
  } else {
    const rec  = +document.getElementById('b-recettes').value||0;
    const dep  = +document.getElementById('b-depenses').value||0;
    const sol  = rec - dep;
    document.getElementById('recap1').textContent = rec.toLocaleString('fr-FR') + ' F';
    document.getElementById('recap1lbl').textContent = 'Recettes';
    document.getElementById('recap2').textContent = dep.toLocaleString('fr-FR') + ' F';
    document.getElementById('recap2lbl').textContent = 'Dépenses';
    document.getElementById('recap3').textContent = sol.toLocaleString('fr-FR') + ' F';
    document.getElementById('recap3lbl').textContent = 'Solde';
    document.getElementById('recap3').style.color = sol >= 0 ? '#1A6B4A' : '#B83232';
  }
}

// ===== SAUVEGARDER =====
function sauvegarder() {
  if (!currentMois) { showToast('Sélectionnez un mois ❗'); return; }
  if (!allData[currentZone]) allData[currentZone] = {};

  if (currentZone === 'production') {
    allData[currentZone][currentMois] = {
      regimes: document.getElementById('p-regimes').value,
      futs:    document.getElementById('p-futs').value,
      huile:   document.getElementById('p-huile').value,
      obs:     document.getElementById('p-obs').value,
      dons:    document.getElementById('p-dons').value,
      salaires:document.getElementById('p-salaires').value,
      autres:  document.getElementById('p-autres').value,
    };
  } else {
    allData[currentZone][currentMois] = {
      recup:    document.getElementById('b-recup').value,
      sortie:   document.getElementById('b-sortie').value,
      vendu:    document.getElementById('b-vendu').value,
      recouvrir:document.getElementById('b-recouvrir').value,
      stocks:   document.getElementById('b-stocks').value,
      retour:   document.getElementById('b-retour').value,
      recettes: document.getElementById('b-recettes').value,
      depenses: document.getElementById('b-depenses').value,
    };
  }

  localStorage.setItem('palmeraie_v2', JSON.stringify(allData));
  const badge = document.getElementById('savedBadge');
  badge.style.display = 'flex';
  setTimeout(() => { badge.style.display = 'none'; }, 3000);
  showToast('✓ ' + currentMois + ' enregistré');
}

// ===== EFFACER =====
function viderFormulaire() {
  document.querySelectorAll('#form-production .field-input, #form-boutique .field-input').forEach(el => { el.value = ''; });
  updateRecap();
}

// ===== PDF =====
function genererPDF() {
  if (!currentMois) { showToast('Sélectionnez un mois ❗'); return; }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const GREEN      = [13, 59, 46];
  const GOLD       = [200, 134, 10];
  const CREAM      = [247, 244, 238];
  const TEXT       = [26, 32, 24];
  const MUTED      = [107, 122, 101];
  const WHITE      = [255, 255, 255];
  const W          = 210;
  const MARGIN     = 18;
  let   y          = 0;

  // Header band
  doc.setFillColor(...GREEN);
  doc.rect(0, 0, W, 40, 'F');

  // Logo zone (palm emoji approximation via text)
  doc.setTextColor(...GOLD);
  doc.setFontSize(24);
  doc.setFont('helvetica', 'bold');
  doc.text('PALMERAIE DIMAKO', MARGIN, 16);

  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(180, 180, 160);
  const zoneLabel = { production:'Zone de production', dimako:'Boutique Dimako', bertoua:'Boutique Bertoua' }[currentZone];
  doc.text(zoneLabel.toUpperCase(), MARGIN, 23);

  // Right side: date & user
  doc.setTextColor(...GOLD);
  doc.setFontSize(9);
  const dateStr = new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
  doc.text(dateStr, W - MARGIN, 16, { align: 'right' });
  doc.setTextColor(180, 180, 160);
  doc.text('Saisi par : ' + currentUser, W - MARGIN, 23, { align: 'right' });

  // Gold underline
  doc.setDrawColor(...GOLD);
  doc.setLineWidth(0.8);
  doc.line(MARGIN, 38, W - MARGIN, 38);

  y = 50;

  // Title block
  doc.setFillColor(...CREAM);
  doc.roundedRect(MARGIN, y, W - MARGIN*2, 18, 3, 3, 'F');
  doc.setTextColor(...GREEN);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text('RAPPORT MENSUEL — ' + currentMois + ' 2026', MARGIN + 8, y + 12);
  y += 26;

  // Section helper
  function drawSection(title, rows) {
    // Section header
    doc.setFillColor(...GREEN);
    doc.rect(MARGIN, y, W - MARGIN*2, 9, 'F');
    doc.setTextColor(...WHITE);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.text(title.toUpperCase(), MARGIN + 4, y + 6);
    y += 9;

    rows.forEach((row, i) => {
      const bg = i % 2 === 0 ? WHITE : CREAM;
      doc.setFillColor(...bg);
      doc.rect(MARGIN, y, W - MARGIN*2, 9, 'F');
      doc.setTextColor(...MUTED);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.text(row[0], MARGIN + 4, y + 6);
      doc.setTextColor(...TEXT);
      doc.setFont('helvetica', 'bold');
      doc.text(String(row[1] || '—'), W - MARGIN - 4, y + 6, { align: 'right' });
      y += 9;
    });

    // Border
    doc.setDrawColor(...GREEN);
    doc.setLineWidth(0.3);
    doc.rect(MARGIN, y - 9 * rows.length - 9, W - MARGIN*2, 9 * rows.length + 9, 'S');
    y += 6;
  }

  if (currentZone === 'production') {
    const d = allData.production?.[currentMois] || {};
    const reg  = +d.regimes||0, h = +d.huile||0;
    const dep  = (+d.dons||0) + (+d.salaires||0) + (+d.autres||0);
    const rend = reg > 0 ? (h/reg).toFixed(2) + ' L/rég.' : '—';

    drawSection('🌴 Récolte', [
      ['Régimes coupés',    (reg||'—') + (reg?' régimes':'')],
      ['Fûts préparés',    (d.futs||'—') + (d.futs?' fûts':'')],
      ['Huile obtenue',    h ? h.toLocaleString('fr-FR') + ' litres' : '—'],
      ['Rendement',        rend],
      ['Observations',     d.obs || '—'],
    ]);

    drawSection('💰 Dépenses', [
      ['Dons divers',          d.dons    ? Number(d.dons).toLocaleString('fr-FR')     + ' FCFA' : '—'],
      ['Salaires presseurs',   d.salaires? Number(d.salaires).toLocaleString('fr-FR') + ' FCFA' : '—'],
      ['Autres dépenses',      d.autres  ? Number(d.autres).toLocaleString('fr-FR')   + ' FCFA' : '—'],
      ['TOTAL DÉPENSES',       dep       ? dep.toLocaleString('fr-FR')                + ' FCFA' : '—'],
    ]);

  } else {
    const d = allData[currentZone]?.[currentMois] || {};
    const rec = +d.recettes||0, dep = +d.depenses||0, sol = rec - dep;

    drawSection('🫙 Stock & Mouvements', [
      ['Huile récupérée',     d.recup     ? Number(d.recup).toLocaleString('fr-FR')     + ' litres' : '—'],
      ['Huile sortie',        d.sortie    ? Number(d.sortie).toLocaleString('fr-FR')    + ' bidons' : '—'],
      ['Huile vendue',        d.vendu     ? Number(d.vendu).toLocaleString('fr-FR')     + ' bidons' : '—'],
      ['À recouvrir',         d.recouvrir ? Number(d.recouvrir).toLocaleString('fr-FR') + ' bidons' : '—'],
      ['Stock restant',       d.stocks    ? Number(d.stocks).toLocaleString('fr-FR')    + ' bidons' : '—'],
      ['Retour mauvaise huile',d.retour   ? Number(d.retour).toLocaleString('fr-FR')    + ' bidons' : '—'],
    ]);

    drawSection('💰 Finances', [
      ['Recettes',   rec ? rec.toLocaleString('fr-FR') + ' FCFA' : '—'],
      ['Dépenses',   dep ? dep.toLocaleString('fr-FR') + ' FCFA' : '—'],
      ['SOLDE',      sol ? sol.toLocaleString('fr-FR') + ' FCFA' : '—'],
    ]);
  }

  // Signature block
  y += 10;
  doc.setFillColor(...CREAM);
  doc.roundedRect(MARGIN, y, W - MARGIN*2, 28, 3, 3, 'F');
  doc.setTextColor(...MUTED);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'normal');
  doc.text('Signature :', MARGIN + 6, y + 8);
  doc.setTextColor(...TEXT);
  doc.setFont('helvetica', 'bold');
  doc.text(currentUser, MARGIN + 30, y + 8);
  doc.setDrawColor(...GREEN);
  doc.setLineWidth(0.3);
  doc.line(MARGIN + 6, y + 22, MARGIN + 80, y + 22);
  doc.setTextColor(...MUTED);
  doc.setFontSize(7);
  doc.setFont('helvetica', 'normal');
  doc.text('Signature et date', MARGIN + 6, y + 27);

  // Footer
  doc.setFillColor(...GREEN);
  doc.rect(0, 280, W, 17, 'F');
  doc.setTextColor(...GOLD);
  doc.setFontSize(7.5);
  doc.setFont('helvetica', 'normal');
  doc.text('Palmeraie Dimako — Document généré le ' + dateStr, MARGIN, 291);
  doc.setTextColor(120, 130, 120);
  doc.text('Page 1/1', W - MARGIN, 291, { align: 'right' });

  const filename = `Palmeraie_${currentZone}_${currentMois}_2026.pdf`;
  doc.save(filename);
  showToast('📄 PDF généré : ' + filename);
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.display = 'none'; }, 3500);
}
</script>
